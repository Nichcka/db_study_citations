<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Citations DB{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗄️</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 600; letter-spacing: .02em; }
    .nav-link.active { font-weight: 500; }
    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    .table td { vertical-align: middle; font-size: .92rem; }
    .badge-rank { font-size: .72rem; }
    .card-header { font-weight: 500; }
    .btn-action { padding: .2rem .5rem; font-size: .8rem; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 1090; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="#"><i class="bi bi-database me-2"></i>Citations DB</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if active == 'articles' %}active{% endif %}" href="{{ url_for('article_list') }}">
            <i class="bi bi-file-earmark-text me-1"></i>Articles
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'taxa' %}active{% endif %}" href="{{ url_for('taxon_list') }}">
            <i class="bi bi-diagram-3 me-1"></i>Taxa
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'links' %}active{% endif %}" href="{{ url_for('taxon_article_list') }}">
            <i class="bi bi-link-45deg me-1"></i>Links
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<!-- Delete confirmation modal (shared) -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Подтверждение удаления</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="deleteModalBody">Удалить запись?</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <form id="deleteForm" method="post">
          <input type="hidden" name="_method" value="DELETE">
          <button type="submit" class="btn btn-danger">Удалить</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Wire up any delete button: <button data-delete-url="/..." data-delete-label="...">
  document.querySelectorAll('[data-delete-url]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('deleteModalBody').textContent =
        'Удалить: ' + (btn.dataset.deleteLabel || 'эту запись') + '?';
      document.getElementById('deleteForm').action = btn.dataset.deleteUrl;
      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    });
  });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
